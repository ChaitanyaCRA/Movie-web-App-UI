<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Web App</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <!-- navbar  -->
        <div class="navbar" name="navigationBar">
                <!-- Div for the movie logo png -->
            <div class="movieLogo">
                <div class="logo-png">
                </div>
            </div>

            <!-- Home Icon -->
            <div class="home_icon border">
                <a href="#" id="home" class="navbar-font-clr"> Home </a>
            </div>

            <!-- Movies Icon -->
            <div class="movies_icon border">
                <a href="#" id="movies" class="navbar-font-clr"> Movies </a>
            </div>

             <!-- Genres icon -->
            <div class="genres_icon border">
                <a href="#" id="genres" class="navbar-font-clr"> Genres </a>
            </div>

              <!-- My List icon -->
            <div class="myList_icon border">
                <a href="#" id="mylist" class="navbar-font-clr"> My List </a>
            </div>

               <!-- Sign in & Sign up -->
            <div class="sign_in_up ">
                <button id="sign_in" class="border"> Sign in </button>
                <button id="sign_up" class="border"> Sign up </button>
            </div>
        </div>
        <hr>

            <!-- Search Bar -->

        <div class="search_box">
            <div class="search_bar">
                
                <div class="search_icon">   <!-- search icon -->
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <input id="searchInput" type="text" placeholder="Search for movies..." >     <!-- input tag -->
                <button id="searchBtn" type="submit" > Search </button>  <!-- search button-->
            </div>
        </div>
    </header>
    

    
    <!-- Main section starts -->
    <main>
        <!-- Movie Select Section  -->
         <div class="movie_grid">

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

            <div class="box">
                <div class="box_content">

                </div>
            </div>

         </div>
         <div class="line">
            <hr id="gridbelow_line">
         </div>

         <!--  Movie description -->
        <div class="description_popup">    

            <div class="movieInfo_popup">

                <div class="movieDesc_image">   </div>   <!-- it will represent the selected movie image -->
                <br>
                <button class="close_btn"> X </button>

                <div class="line_container">
                    <div class="popupline"> </div>
                </div>

                <h2> Movie Title </h2>

                <div class="line_container">
                    <div class="popupline"> </div>
                </div>

                <p id="desc_para">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aspernatur recusandae cumque eius, sint amet et, ducimus quae earum veniam, a natus aliquid! Excepturi perspiciatis, harum molestias accusantium nemo possimus neque?</p>

                <div class="watchList_btn">
                    <button class="watch_now"> Watch Now </button>
                    <button class="Add to List"> Add to List </button>
                </div>

            </div>
        </div>   
    </main>

    <script src="script.js"></script>
</body>

</html>
